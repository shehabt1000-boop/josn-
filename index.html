

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دليل الشرقية V3 - الماسية</title>
   
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
   
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
   
    <!-- Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans:['Cairo', 'sans-serif'] },
                    colors: { primary: '#000000', secondary: '#2563EB', darkBg: '#111827' },
                    animation: { 'fade': 'fadeIn 0.2s ease-in-out', 'pop': 'popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)' },
                    keyframes: {
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                        popIn: { '0%': { transform: 'scale(0.9)', opacity: 0 }, '100%': { transform: 'scale(1)', opacity: 1 } }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        button { cursor: pointer; touch-action: manipulation; }
       
        /* Custom Scrollbar for lists */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; display: block; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-track { background: #374151; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Glass Header */
        .glass-header { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border-bottom: 2px solid #000; }
        .dark .glass-header { background: rgba(17, 24, 39, 0.98); border-bottom: 2px solid #4b5563; }
       
        /* Inputs - Compact & Bordered */
        input, select, textarea {
            border: 2px solid #d1d5db;
            background-color: #ffffff;
            transition: all 0.2s;
            font-size: 13px;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #000000;
            outline: none;
        }
        .dark input, .dark select, .dark textarea {
            background-color: #1f2937;
            border-color: #4b5563;
            color: white;
        }
        .dark input:focus { border-color: #fff; }
       
        /* Black Borders Custom Class */
        .border-black-custom {
            border: 2px solid #000000 !important;
            box-shadow: 2px 2px 0px #000000 !important;
        }
        .dark .border-black-custom {
            border: 2px solid #6b7280 !important;
            box-shadow: 2px 2px 0px #6b7280 !important;
        }
       
        /* Provider Card */
        .provider-card {
            border: 2px solid #000000;
            box-shadow: 2px 2px 0px #000000;
        }
        .dark .provider-card { border-color: #9ca3af; box-shadow: 2px 2px 0px #9ca3af; }

        /* Modals */
        .full-screen-modal { position: fixed; inset: 0; z-index: 100; background: white; display: flex; flex-direction: column; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .dark .full-screen-modal { background: #111827; }

        /* Toast */
        #toast-box { position: fixed; top: 20px; left: 0; right: 0; display: flex; justify-content: center; z-index: 9999; pointer-events: none; }
        .toast-msg { background: #000; color: white; padding: 8px 20px; border: 2px solid #fff; border-radius: 30px; font-size: 12px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0; transform: translateY(-20px); transition: all 0.3s; }
        .toast-msg.show { opacity: 1; transform: translateY(0); }

        /* Badge */
        .badge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; border: 1px solid #000; }
        .dark .badge { border-color: #fff; }
       
        /* Stars */
        .star-rating { direction: ltr; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #ddd; font-size: 24px; padding: 0 2px; cursor: pointer; transition: color 0.2s; }
        .star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label { color: #fbbf24; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen pb-24 transition-colors duration-200">

    <div id="toast-box"></div>

    <!-- Modern Loader -->
    <div id="loader" class="fixed inset-0 z-[200] flex flex-col items-center justify-center transition-opacity duration-300">
        <!-- صورة خلفية من Pexels مصغرة لعدم استهلاك باقة الإنترنت مع بلور -->
        <div class="absolute inset-0 bg-cover bg-center bg-no-repeat" style="background-image: url('https://images.pexels.com/photos/3184418/pexels-photo-3184418.jpeg?auto=compress&cs=tinysrgb&w=300&blur=10');"></div>
        <!-- طبقة زجاجية بيضاء/سوداء لضمان وضوح النصوص والأيقونة -->
        <div class="absolute inset-0 bg-white/85 dark:bg-gray-900/85 backdrop-blur-sm"></div>

        <!-- محتوى شاشة التحميل -->
        <div class="relative z-10 flex flex-col items-center">
            <!-- اللوجو (ثابت بدون حركة لمنع استهلاك المعالج وتجنب اللاج) -->
            <svg class="w-16 h-16 text-black dark:text-white mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <h2 class="text-xl font-extrabold text-black dark:text-white tracking-wider mb-4 drop-shadow-sm">خدمات الشرقية</h2>
            <!-- نقاط التحميل السفلية -->
            <div class="flex gap-1.5">
                <div class="w-2.5 h-2.5 bg-black dark:bg-white rounded-full animate-[bounce_1s_infinite_0ms]"></div>
                <div class="w-2.5 h-2.5 bg-black dark:bg-white rounded-full animate-[bounce_1s_infinite_200ms]"></div>
                <div class="w-2.5 h-2.5 bg-black dark:bg-white rounded-full animate-[bounce_1s_infinite_400ms]"></div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header id="app-header" class="fixed top-0 left-0 right-0 h-14 glass-header z-50 px-4 flex items-center justify-between hidden md:max-w-4xl md:mx-auto">
        <div class="flex items-center gap-2">
            <button id="btn-back" onclick="window.goBack()" class="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 hidden border-2 border-black dark:border-gray-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
            </button>
            <h1 id="page-title" class="text-[10px] font-bold sm:text-xs flex items-center">الرئيسية</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="window.toggleNotifPanel()" class="relative p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 border-2 border-transparent hover:border-black dark:hover:border-gray-500 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                <span id="notif-dot" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border border-white"></span>
            </button>
            <img id="header-avatar" src="" class="w-8 h-8 rounded-full bg-gray-200 object-cover border-2 border-black dark:border-gray-400 cursor-pointer" onclick="window.navTo('profile')">
        </div>
    </header>

    <!-- Notification Panel -->
    <div id="notif-panel" class="fixed top-16 left-4 right-4 bg-white dark:bg-gray-800 rounded-xl border-2 border-black dark:border-gray-600 shadow-[4px_4px_0px_#000] z-40 hidden md:max-w-md md:mx-auto animate-pop origin-top-right p-4">
        <div class="flex justify-between items-center mb-2 border-b-2 border-gray-100 pb-2 dark:border-gray-700">
            <h3 class="font-bold text-sm">الإشعارات</h3>
            <button onclick="window.toggleNotifPanel()" class="text-gray-400 hover:text-red-500 font-bold">✕</button>
        </div>
        <div id="notif-list" class="space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-1">
            <p class="text-center text-xs text-gray-400 py-4">لا توجد إشعارات حالياً</p>
        </div>
    </div>

    <!-- AUTH VIEW -->
    <div id="auth-view" class="hidden min-h-screen flex flex-col justify-center p-4 md:max-w-md md:mx-auto">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-extrabold border-b-4 border-black inline-block pb-1 dark:border-white">خدمات الشرقية</h1>
        </div>

        <!-- Auth Toggle -->
        <div class="bg-gray-200 dark:bg-gray-800 p-1 rounded-lg flex mb-4 border-2 border-black dark:border-gray-500 h-12">
            <button onclick="window.switchAuthMode('login')" id="btn-mode-login" class="flex-1 rounded-md text-xs font-bold bg-black text-white shadow-sm transition-all">دخول</button>
            <button onclick="window.switchAuthMode('signup')" id="btn-mode-signup" class="flex-1 rounded-md text-xs font-bold text-gray-500 bg-transparent hover:bg-gray-300 dark:hover:bg-gray-700 transition-all">جديد</button>
        </div>

        <!-- Login Form -->
        <form id="form-login" class="space-y-3">
            <div class="space-y-3 bg-white dark:bg-gray-800 p-6 rounded-xl border-2 border-black dark:border-gray-500 shadow-[4px_4px_0px_#000] dark:shadow-[4px_4px_0px_#6b7280]">
                <div class="flex rounded-lg border-2 border-gray-300 dark:border-gray-600 overflow-hidden focus-within:border-black dark:focus-within:border-white h-11 bg-white dark:bg-gray-800 transition-colors">
                    <input type="tel" id="login-phone" placeholder="مثال: 1012345678" class="w-full p-2 text-sm border-none outline-none bg-transparent text-left" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required dir="ltr">
                    <span class="bg-gray-100 dark:bg-gray-700 px-3 flex items-center font-bold text-gray-600 dark:text-gray-300 border-l-2 border-gray-300 dark:border-gray-600" dir="ltr">+20</span>
                </div>
                
                <input type="password" id="login-pass" placeholder="كلمة المرور" class="w-full p-3 rounded-lg text-sm" required>
                <button type="submit" class="w-full py-3 bg-black text-white rounded-lg font-bold text-sm hover:bg-gray-900 active:scale-95 transition-transform">تسجيل الدخول</button>
            </div>
        </form>

        <!-- Signup Form -->
        <form id="form-signup" class="hidden bg-white dark:bg-gray-800 p-4 rounded-xl border-2 border-black dark:border-gray-500 shadow-[4px_4px_0px_#000] dark:shadow-[4px_4px_0px_#6b7280]">
            <div class="flex justify-center mb-3">
                <div class="w-16 h-16 rounded-full bg-gray-100 dark:bg-gray-700 border-2 border-dashed border-gray-400 relative overflow-hidden cursor-pointer" onclick="document.getElementById('signup-file').click()">
                    <img id="signup-preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%239ca3af'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" class="w-full h-full object-cover opacity-80 hover:opacity-100">
                </div>
                <input type="file" id="signup-file" class="hidden" accept="image/*" onchange="window.handleImageUpload(this, 'signup-preview')">
            </div>
           
            <div class="space-y-2">
                <input type="text" id="signup-name" placeholder="الاسم" class="w-full p-2 rounded-lg text-sm h-10" required>
                <div class="flex rounded-lg border-2 border-gray-300 dark:border-gray-600 overflow-hidden focus-within:border-black dark:focus-within:border-white h-10 bg-white dark:bg-gray-800 transition-colors">
                    <input type="tel" id="signup-phone" placeholder="رقم الهاتف (10 أرقام)" class="w-full p-2 text-sm border-none outline-none bg-transparent text-left" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required dir="ltr">
                    <span class="bg-gray-100 dark:bg-gray-700 px-3 flex items-center font-bold text-gray-600 dark:text-gray-300 border-l-2 border-gray-300 dark:border-gray-600" dir="ltr">+20</span>
                </div>
                <input type="password" id="signup-pass" placeholder="كلمة المرور" class="w-full p-2 rounded-lg text-sm h-10" required>
               
                <div class="grid grid-cols-2 gap-2">
                    <select id="signup-center" onchange="window.updateVillages()" class="w-full p-1 rounded-lg text-xs h-10 bg-white dark:bg-gray-700"><option value="">المركز</option></select>
                    <select id="signup-village" class="w-full p-1 rounded-lg text-xs h-10 bg-white dark:bg-gray-700"><option value="">القرية</option></select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-lg border border-gray-300 h-9 items-center">
                        <label class="flex-1 text-center cursor-pointer text-[10px]"><input type="radio" name="gender" value="male" checked> ذكر</label>
                        <label class="flex-1 text-center cursor-pointer text-[10px]"><input type="radio" name="gender" value="female"> أنثى</label>
                    </div>
                    <div class="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-lg border border-gray-300 h-9 items-center">
                        <label class="flex-1 text-center cursor-pointer text-[10px] font-bold"><input type="radio" name="role" value="client" checked onchange="window.toggleProfVisibility(false)"> عميل</label>
                        <label class="flex-1 text-center cursor-pointer text-[10px] font-bold"><input type="radio" name="role" value="provider" onchange="window.toggleProfVisibility(true)"> مقدم خدمة</label>
                    </div>
                </div>

                <div id="prof-container" class="hidden mt-2">
                    <select id="signup-prof" class="w-full p-2 rounded-lg text-xs h-10"><option value="">اختر المهنة...</option></select>
                </div>
            </div>

            <button type="submit" class="w-full py-2.5 bg-green-600 text-white rounded-lg font-bold text-sm mt-3 shadow hover:bg-green-700 active:scale-95 transition-all">إنشاء حساب</button>
        </form>
    </div>

    <!-- APP VIEW -->
    <div id="app-view" class="hidden w-full md:max-w-4xl md:mx-auto pt-16 min-h-screen relative">
       
        <!-- HOME -->
        <section id="page-home" class="page-section px-3 animate-fade">
            <div class="sticky top-14 z-30 bg-gray-100 dark:bg-gray-900 py-2 mb-2 space-y-2">
                <div class="flex p-1 bg-white dark:bg-gray-800 rounded-lg border-2 border-black dark:border-gray-500 shadow-[2px_2px_0px_#000] max-w-md mx-auto h-10 items-center">
                    <button onclick="window.switchHomeTab('services')" id="tab-home-serv" class="flex-1 h-full rounded text-xs font-bold bg-black text-white transition-all">خدمات</button>
                    <button onclick="window.switchHomeTab('jobs')" id="tab-home-jobs" class="flex-1 h-full rounded text-xs font-bold text-gray-500 transition-all">وظائف</button>
                </div>
                <div id="prof-search-box" class="relative max-w-md mx-auto">
                    <input type="text" id="prof-search" onkeyup="window.filterProfessions()" placeholder="ابحث عن مهنة..." class="w-full p-2 pr-8 rounded-lg border-2 border-black dark:border-gray-500 text-xs h-10">
                    <button onclick="document.getElementById('prof-search').value=''; window.filterProfessions()" class="absolute left-2 top-2.5 text-gray-400 hover:text-black">✕</button>
                </div>
            </div>
           
            <div id="view-services" class="pb-4">
                <div id="professions-grid" class="grid grid-cols-3 md:grid-cols-5 gap-2"></div>
            </div>
           
            <div id="view-jobs" class="hidden space-y-3 pb-4 max-w-2xl mx-auto">
                <p class="text-center text-gray-400 py-10 text-[10px] font-bold">جاري تحميل الوظائف...</p>
            </div>
        </section>

        <!-- CATEGORY -->
        <section id="page-category-details" class="page-section hidden px-3 animate-fade">
            <div class="max-w-md mx-auto">
                <input type="text" id="cat-search" onkeyup="window.filterCategory()" placeholder="ابحث عن شخص أو عنوان..." class="w-full p-2 rounded-lg border-2 border-black mb-3 text-xs h-10">
                <div id="cat-list-container" class="space-y-2 pb-20"></div>
            </div>
        </section>

        <!-- DIRECTORY -->
        <section id="page-directory" class="page-section hidden px-3 animate-fade">
            <div class="max-w-md mx-auto">
                <input type="text" id="dir-search" onkeyup="window.filterDirectory()" placeholder="ابحث عن شخص، وظيفة أو عنوان..." class="w-full p-2 rounded-lg border-2 border-black mb-3 text-xs h-10">
                <div id="dir-list" class="space-y-2 pb-20"></div>
            </div>
        </section>

        <!-- ADD -->
        <section id="page-add" class="page-section hidden px-4 animate-fade">
            <div class="bg-white dark:bg-gray-800 rounded-xl border-black-custom p-5 max-w-lg mx-auto mt-4">
                <h2 class="text-base font-bold mb-4 text-center border-b-2 border-gray-100 pb-2">إضافة جديد</h2>
                <div class="flex gap-2 mb-4">
                    <button onclick="window.switchAddMode('req')" id="btn-add-req" class="flex-1 py-2 rounded-lg text-xs font-bold border-2 border-black bg-black text-white transition-all">طلب خدمة</button>
                    <button onclick="window.switchAddMode('job')" id="btn-add-job" class="flex-1 py-2 rounded-lg text-xs font-bold border-2 border-gray-300 bg-white text-gray-500 transition-all">وظيفة</button>
                </div>
               
                <form id="form-req" class="space-y-3">
                    <select id="req-prof" class="w-full p-2 rounded-lg text-xs border-2 border-gray-300"></select>
                    <textarea id="req-desc" rows="4" placeholder="وصف المشكلة..." class="w-full p-2 rounded-lg text-xs border-2 border-gray-300" required></textarea>
                    
                    <div class="flex rounded-lg border-2 border-gray-300 dark:border-gray-600 overflow-hidden focus-within:border-black dark:focus-within:border-white h-10 bg-white dark:bg-gray-800 transition-colors">
                        <input type="tel" id="req-phone" placeholder="الواتساب (اختياري)" class="w-full p-2 text-sm border-none outline-none bg-transparent text-left" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" dir="ltr">
                        <span class="bg-gray-100 dark:bg-gray-700 px-3 flex items-center font-bold text-gray-600 dark:text-gray-300 border-l-2 border-gray-300 dark:border-gray-600" dir="ltr">+20</span>
                    </div>
                    <button type="submit" class="w-full py-3 bg-black text-white rounded-lg font-bold text-sm shadow hover:bg-gray-900">نشر الطلب</button>
                </form>

                <form id="form-job" class="hidden space-y-3">
                    <select id="job-title-select" onchange="if(this.value==='أخرى') document.getElementById('job-custom-title').classList.remove('hidden'); else document.getElementById('job-custom-title').classList.add('hidden');" class="w-full p-2 rounded-lg text-xs border-2 border-gray-300"></select>
                    <input type="text" id="job-custom-title" placeholder="اكتب اسم الوظيفة..." class="hidden w-full p-2 rounded-lg border-2 border-blue-300 bg-blue-50">
                   
                    <div class="grid grid-cols-2 gap-2">
                         <input type="number" id="job-salary" placeholder="الراتب (ج.م)" class="w-full p-2 rounded-lg text-xs">
                         <input type="text" id="job-hours" placeholder="ساعات العمل" class="w-full p-2 rounded-lg text-xs">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <select id="job-shift" class="w-full p-2 rounded-lg text-xs">
                            <option value="صباحي">شيفت صباحي</option>
                            <option value="مسائي">شيفت مسائي</option>
                            <option value="متغير">شيفت متغير</option>
                        </select>
                        <select id="job-type" class="w-full p-2 rounded-lg text-xs">
                            <option value="full">دوام كامل</option>
                            <option value="part">دوام جزئي</option>
                        </select>
                    </div>

                    <div class="flex rounded-lg border-2 border-gray-300 dark:border-gray-600 overflow-hidden focus-within:border-black dark:focus-within:border-white h-10 bg-white dark:bg-gray-800 transition-colors">
                        <input type="tel" id="job-phone" placeholder="رقم التواصل" class="w-full p-2 text-sm border-none outline-none bg-transparent text-left" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required dir="ltr">
                        <span class="bg-gray-100 dark:bg-gray-700 px-3 flex items-center font-bold text-gray-600 dark:text-gray-300 border-l-2 border-gray-300 dark:border-gray-600" dir="ltr">+20</span>
                    </div>

                    <textarea id="job-desc" rows="4" placeholder="تفاصيل الوظيفة..." class="w-full p-2 rounded-lg text-xs border-2 border-gray-300" required></textarea>
                    <button type="submit" class="w-full py-3 bg-black text-white rounded-lg font-bold text-sm shadow hover:bg-gray-800">نشر الوظيفة</button>
                </form>
            </div>
        </section>

        <!-- PROFILE -->
        <section id="page-profile" class="page-section hidden px-3 animate-fade">
            <div class="max-w-md mx-auto">
                <div class="bg-white dark:bg-gray-800 rounded-xl border-black-custom p-4 relative overflow-hidden mt-4">
                    <div class="flex flex-col items-center">
                        <img id="prof-img-view" src="" class="w-20 h-20 rounded-full border-2 border-black dark:border-gray-500 bg-white object-cover">
                        <h2 id="prof-name-view" class="text-lg font-extrabold mt-2 dark:text-white"></h2>

            const fd = new FormData();
            fd.append("file", file);
            fd.append("upload_preset", UPLOAD_PRESET);
            const res = await fetch(url, { method: "POST", body: fd });
            if (!res.ok) throw new Error("فشل رفع الصورة");
            const data = await res.json();
            return data.secure_url;

        window.getCloudinaryUrl = (url, size = 'thumb') => {
            if (!url) return 'https://via.placeholder.com/40';
            if (url.startsWith('data:image') && url.length > 50000) return 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%239ca3af"%3E%3Cpath d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/%3E%3C/svg%3E';
            if (!url.includes('res.cloudinary.com')) return url; 
            const parts = url.split('/upload/');
            if (parts.length < 2) return url;
            if (size === 'thumb') return `${parts[0]}/upload/w_100,h_100,c_fill,q_auto,f_auto/${parts[1]}`;
            if (size === 'medium') return `${parts[0]}/upload/w_500,c_limit,q_auto,f_auto/${parts[1]}`;
            return `${parts[0]}/upload/q_auto,f_auto/${parts[1]}`;
        };

        async function loadReviews(targetId) {
             const list = document.getElementById('modal-reviews-list');
             const starsDisplay = document.getElementById('modal-stars-display');
             list.innerHTML = '<p class="text-[10px] text-gray-400 text-center p-2">جاري التحميل...</p>';
             const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reviews'), where('toId', '==', targetId));
             const snap = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js").then(m => m.getDocs(q));
             list.innerHTML = '';
             let totalStars = 0;
             if(snap.empty) { list.innerHTML = '<p class="text-[10px] text-gray-400 text-center p-2 font-bold mt-4">لا توجد تقييمات حتى الآن</p>'; starsDisplay.innerText = '0.0'; }
             else {
                 const reviews =[]; snap.forEach(d => reviews.push(d.data()));
                 reviews.forEach((r) => {
                     totalStars += parseInt(r.stars);
                     const el = document.createElement('div');
                     el.className = `bg-gray-50 dark:bg-gray-700/50 p-2 rounded mb-1 border border-gray-200 dark:border-gray-600`;
                     el.innerHTML = `<div class="flex justify-between items-start"><div class="flex items-center gap-1"><img src="${window.getCloudinaryUrl(r.fromPhoto, 'thumb')}" class="w-5 h-5 rounded-full border border-black"><span class="text-[10px] font-bold dark:text-white">${r.fromName}</span></div><span class="text-yellow-500 text-[10px]">${'★'.repeat(r.stars)}</span></div><p class="text-[10px] text-gray-600 dark:text-gray-300 mt-1">${r.comment}</p>`;
                     list.appendChild(el);
                 });
                 starsDisplay.innerText = (totalStars / reviews.length).toFixed(1);
             }
        }

                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reviews'), {
                    fromId: currentUser.uid, fromName: userProfile.name, fromPhoto: userProfile.photoURL,

                document.getElementById('rate-modal').classList.add('hidden');

                }
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'profiles', currentUser.uid), {
                    name: document.getElementById('edit-name').value, phone: `+20${document.getElementById('edit-phone').value}`,
                    city: document.getElementById('edit-center').value, area: document.getElementById('edit-village').value, photoURL: finalPhotoURL
                });
                window.location.reload();
            } catch (e) { window.showToast('حدث خطأ أثناء الحفظ', 'error'); window.hideLoader(); }
        };
       
        window.saveSettings = async () => {
            try {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'profiles', currentUser.uid), { settings: {
                    notifEnabled: document.getElementById('toggle-notif').checked,
                    hidePhone: document.getElementById('toggle-hide-phone').checked,
                    hideProfile: document.getElementById('toggle-hide-profile').checked
                }});
                window.showToast('تم الحفظ بنجاح'); window.goBack();
            } catch (e) { window.showToast('خطأ', 'error'); }
        };

        window.switchAddMode = (mode) => {
            const btnReq = document.getElementById('btn-add-req');
            const btnJob = document.getElementById('btn-add-job');
            const formReq = document.getElementById('form-req');
            const formJob = document.getElementById('form-job');

            if (mode === 'req') {
                formReq.classList.remove('hidden'); formJob.classList.add('hidden');
                btnReq.className = "flex-1 py-2 rounded-lg text-xs font-bold border-2 border-black bg-black text-white transition-all";
                btnJob.className = "flex-1 py-2 rounded-lg text-xs font-bold border-2 border-gray-300 bg-white text-gray-500 transition-all";
            } else {
                formReq.classList.add('hidden'); formJob.classList.remove('hidden');
                btnJob.className = "flex-1 py-2 rounded-lg text-xs font-bold border-2 border-black bg-black text-white transition-all";
                btnReq.className = "flex-1 py-2 rounded-lg text-xs font-bold border-2 border-gray-300 bg-white text-gray-500 transition-all";
            }
        };
       
        document.getElementById('form-job').onsubmit = async (e) => {
            e.preventDefault();
            try {
                let title = document.getElementById('job-title-select').value;
                if (title === 'أخرى') title = document.getElementById('job-custom-title').value;
                if(!title) throw new Error('أدخل المسمى الوظيفي');

                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'requests'), {
                    type: 'job', title: title, salary: document.getElementById('job-salary').value, hours: document.getElementById('job-hours').value,
                    shift: document.getElementById('job-shift').value, jobType: document.getElementById('job-type').value, desc: document.getElementById('job-desc').value,
                    contactPhone: document.getElementById('job-phone').value, posterName: userProfile.name, posterPhoto: userProfile.photoURL,
                    posterPhone: userProfile.phone, uid: currentUser.uid, createdAt: new Date().toISOString()
                });
                window.showToast('تم النشر بنجاح'); e.target.reset(); window.goBack();
            } catch(err) { window.showToast(err.message || 'حدث خطأ', 'error'); }
        };
       
        document.getElementById('form-req').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'requests'), {
                    type: 'service', profession: document.getElementById('req-prof').value, desc: document.getElementById('req-desc').value,
                    phone: document.getElementById('req-phone').value, uid: currentUser.uid, requesterName: userProfile.name, requesterPhoto: userProfile.photoURL,
                    createdAt: new Date().toISOString()
                });
                window.showToast('تم النشر بنجاح'); e.target.reset(); window.goBack();
            } catch(err) { window.showToast('خطأ', 'error'); }
        };
       
        window.switchHomeTab = (tab) => { 
            window.scrollTo(0, 0);
            if (tab === 'services') { 
                document.getElementById('view-services').classList.remove('hidden'); 
                document.getElementById('view-jobs').classList.add('hidden'); 
                document.getElementById('prof-search-box').classList.remove('hidden'); 
                document.getElementById('tab-home-serv').classList.add('bg-black', 'text-white'); 
                document.getElementById('tab-home-serv').classList.remove('text-gray-500'); 
                document.getElementById('tab-home-jobs').classList.remove('bg-black', 'text-white'); 
                document.getElementById('tab-home-jobs').classList.add('text-gray-500'); 
            } else { 
                document.getElementById('view-services').classList.add('hidden'); 
                document.getElementById('view-jobs').classList.remove('hidden'); 
                document.getElementById('prof-search-box').classList.add('hidden'); 
                document.getElementById('tab-home-jobs').classList.add('bg-black', 'text-white'); 
                document.getElementById('tab-home-jobs').classList.remove('text-gray-500'); 
                document.getElementById('tab-home-serv').classList.remove('bg-black', 'text-white'); 
                document.getElementById('tab-home-serv').classList.add('text-gray-500'); 
            } 
        };

        window.logout = () => { 
            signOut(auth); 
            navStack =['home']; 
            if(unsubChats) unsubChats();
            if(unsubProfiles) unsubProfiles();
            if(unsubMatching) unsubMatching();
            if(unsubReviews) unsubReviews();
            if(unsubJobs) unsubJobs();
            if(unsubActivity) unsubActivity();

            reqNotifs =[];
            reviewNotifs = [];
            myChatsCache =[];
            allUsersCache =[];
            
            document.getElementById('notif-list').innerHTML = '<p class="text-center text-[10px] font-bold text-gray-400 py-4">لا توجد إشعارات حالياً</p>';
            document.getElementById('notif-dot').classList.add('hidden');
            document.getElementById('my-activity').innerHTML = '';
            document.getElementById('matching-reqs-list').innerHTML = '';
            document.getElementById('chat-history-list').innerHTML = '';
            const badge = document.getElementById('act-notif-badge');
            if(badge) badge.classList.add('hidden');
        };

        window.toggleTheme = () => document.documentElement.classList.toggle('dark');
    </script>
</body>
</html>
